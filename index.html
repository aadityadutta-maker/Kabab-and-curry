<!DOCTYPE html>
<!-- FULL CLOUD SYSTEM TEMPLATE USING FIREBASE -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kabab & Curry | Cloud System</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f7f7f7;margin:0}
header{background:#111;color:#fff;text-align:center;padding:15px}
section{max-width:900px;margin:auto;padding:20px}
input,button{padding:10px;margin:5px;width:100%}
button{background:#e63946;color:#fff;border:none}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:8px}
</style>
</head>
<body>

<header>
<h2>Kabab & Curry – Cloud Order System</h2>
</header>

<!-- LOGIN -->
<section id="login">
<h3>Customer Login (OTP)</h3>
<input id="phone" placeholder="+91XXXXXXXXXX">
<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button>

<div id="recaptcha"></div>
</section>

<!-- ORDER -->
<section id="order" style="display:none">
<h3>Place Order</h3>

<select id="item">
<option value="80">Veg Clear Soup – ₹80</option>
<option value="250">Paneer Tikka – ₹250</option>
<option value="280">Chicken Tikka – ₹280</option>
<option value="280">Chilly Chicken – ₹280</option>
</select>

<input id="qty" type="number" value="1">
<button onclick="add()">Add</button>

<div id="cart"></div>
<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="placeOrder()">Confirm Order</button>
</section>

<!-- ADMIN -->
<section id="admin" style="display:none">
<h3>Admin Panel</h3>
<div id="orders"></div>
<button onclick="downloadReport()">Download Daily Report</button>
</section>

<script>

/* FIREBASE CONFIG (REPLACE WITH YOURS) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* OTP LOGIN */
let confirmation;

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha');

function sendOTP(){
 const phone=document.getElementById("phone").value;
 auth.signInWithPhoneNumber(phone,window.recaptchaVerifier)
 .then(res=>{
 confirmation=res;
 alert("OTP Sent");
 });
}

function verifyOTP(){
 const code=document.getElementById("otp").value;
 confirmation.confirm(code).then(res=>{
 document.getElementById("login").style.display="none";
 document.getElementById("order").style.display="block";
 loadAdmin();
 });
}

/* CART */
let cart=[];let total=0;

function add(){
 const sel=document.getElementById("item");
 const price=parseInt(sel.value);
 const name=sel.options[sel.selectedIndex].text;
 const qty=parseInt(document.getElementById("qty").value);

 cart.push({name,price,qty});
 total+=price*qty;
 render();
}

function render(){
 let html="";
 cart.forEach(i=>{
 html+=`${i.name} x ${i.qty}<br>`;
 });
 document.getElementById("cart").innerHTML=html;
 document.getElementById("total").innerText=total;
}

/* PLACE ORDER */
function placeOrder(){
 const user=auth.currentUser.phoneNumber;

 db.collection("orders").add({
  user:user,
  items:cart,
  total:total,
  status:"Pending",
  date:new Date()
 });

 alert("Order Placed. You will get confirmation.");
 cart=[];total=0;render();
}

/* ADMIN PANEL */
function loadAdmin(){
 auth.onAuthStateChanged(user=>{
  if(user && user.phoneNumber==="+919630697343"){
   document.getElementById("admin").style.display="block";
   fetchOrders();
  }
 });
}

function fetchOrders(){
 db.collection("orders").onSnapshot(snap=>{
  let html="";
  snap.forEach(doc=>{
   let o=doc.data();
   html+=`<div class='card'>
   ${o.user}<br>Total ₹${o.total}<br>Status:${o.status}
   <button onclick=confirm('${doc.id}')>Confirm</button>
   </div>`;
  });
  document.getElementById("orders").innerHTML=html;
 });
}

function confirm(id){
 db.collection("orders").doc(id).update({status:"Confirmed"});
}

/* REPORT */
function downloadReport(){
 db.collection("orders").get().then(snap=>{
  let csv="User,Total,Status\n";
  snap.forEach(d=>{
   let o=d.data();
   csv+=`${o.user},${o.total},${o.status}\n`;
  });

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="sales.csv";
  a.click();
 });
}

</script>
</body>
</html>
