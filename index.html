<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kabab & Curry | Order System</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f7f7f7;
}

header{
background:#111;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#222;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-weight:bold;
}

section{
max-width:1200px;
margin:auto;
padding:25px;
}

h2{
border-bottom:2px solid #e63946;
padding-bottom:5px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
padding:15px;
text-align:center;
}

.card button{
background:#e63946;
color:white;
border:none;
padding:7px 12px;
border-radius:5px;
cursor:pointer;
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
}

button{
background:#e63946;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:5px;
}

#cart,#adminPanel,#otpBox{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

#otpBox{
display:none;
margin-top:15px;
border:2px dashed #e63946;
}

</style>
</head>

<body>

<header>
<h1>Kabab & Curry</h1>
<p>Swad Dilli Ka | Rishikesh</p>
</header>

<nav>
<a href="#menu">Menu</a>
<a href="#cart">Cart</a>
<a href="#billing">Billing</a>
<a href="#admin">Admin</a>
</nav>


<!-- MENU -->

<section id="menu">

<h2>Menu</h2>

<div class="menu-grid">

<div class="card">
<h4>Paneer Tikka</h4>
<p>₹250</p>
<button onclick="add('Paneer Tikka',250)">Add</button>
</div>

<div class="card">
<h4>Chicken Tikka</h4>
<p>₹280</p>
<button onclick="add('Chicken Tikka',280)">Add</button>
</div>

<div class="card">
<h4>Chilly Chicken</h4>
<p>₹280</p>
<button onclick="add('Chilly Chicken',280)">Add</button>
</div>

<div class="card">
<h4>Fish Tikka</h4>
<p>₹300</p>
<button onclick="add('Fish Tikka',300)">Add</button>
</div>

</div>

</section>


<!-- CART -->

<section id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

</section>


<!-- BILLING -->

<section id="billing">

<h2>Billing</h2>

<!-- BILL FORM -->

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="startOTP()">Place Order</button>

<p id="msg"></p>


<!-- OTP BOX -->

<div id="otpBox">

<h3>OTP Verification</h3>

<input id="otpInput" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify & Confirm</button>

<p id="otpMsg"></p>

</div>

</section>


<!-- ADMIN -->

<section id="admin">

<h2>Admin Panel</h2>

<input type="password" id="adminPass" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="adminPanel" style="display:none">

<h3>Orders</h3>

<div id="orders"></div>

</div>

</section>


<footer>
© 2026 Kabab & Curry
</footer>


<script>

/* CART */

let cart=[];
let total=0;
let orders=[];

function add(name,price){

cart.push({name,price});
total+=price;
render();

}

function render(){

let html="";

cart.forEach((i,n)=>{

html+=`${n+1}. ${i.name} - ₹${i.price}<br>`;

});

cartItems.innerHTML=html;
totalSpan.innerText=total;

}

const cartItems=document.getElementById("cartItems");
const totalSpan=document.getElementById("total");


/* OTP SYSTEM */

let demoOTP="";
let otpVerified=false;


// Start OTP
function startOTP(){

let n=name.value;
let p=phone.value;
let a=address.value;

if(n==""||p==""||a==""||cart.length==0){

alert("Fill all details & add items");
return;

}

// Generate OTP
demoOTP=Math.floor(1000+Math.random()*9000);

alert("Your OTP: "+demoOTP); // DEMO

otpBox.style.display="block";

}


// Verify OTP
function verifyOTP(){

if(otpInput.value==demoOTP){

otpVerified=true;

otpMsg.innerText="✅ Verified";

finalOrder();

}else{

otpMsg.innerText="❌ Wrong OTP";

}

}


/* FINAL ORDER */

function finalOrder(){

if(!otpVerified) return;

orders.push({

name:name.value,
phone:phone.value,
address:address.value,
items:[...cart],
total:total,
status:"Pending"

});

cart=[];
total=0;

render();

msg.innerText="Order Placed Successfully ✅";

alert("Order Confirmed");

otpBox.style.display="none";

otpVerified=false;

}


/* ADMIN */

const PASSWORD="admin123";

function adminLogin(){

if(adminPass.value==="admin123"){

adminPanel.style.display="block";
showOrders();

}else{

alert("Wrong Password");

}

}

function showOrders(){

let html="";

orders.forEach((o,i)=>{

html+=`

<div style="border:1px solid #ccc;padding:10px;margin:10px">

<b>${o.name}</b> (${o.phone})<br>

${o.address}<br>

${o.items.map(x=>x.name).join(", ")}<br>

₹${o.total}<br>

${o.status}<br>

<button onclick="confirm(${i})">Confirm</button>

</div>

`;

});

orders.innerHTML=html;

}

function confirm(i){

orders[i].status="Confirmed";

alert("Confirmed");

showOrders();

}

</script>

</body>
</html>
